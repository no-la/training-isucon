upstream app {
  server 127.0.0.1:8080;
  keepalive 64;
  keepalive_requests 10000;
}

server {
  listen 80;

  client_max_body_size 10m;
  root /home/isucon/private_isu/webapp/public/;

  # css, js, img などの静的アセット
  location ~ ^/(css|js|img|favicon\.ico) {
    expires 1h;
    access_log off;
    try_files $uri =404;
  }

  # 投稿画像: 先にディスクから返し、無ければアプリへ
  location ~ ^/image/\d+\.(jpg|png|gif)$ {
    expires 1h;
    try_files $uri @app;
  }

  location @app {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_pass http://app;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_pass http://app;
  }
}
